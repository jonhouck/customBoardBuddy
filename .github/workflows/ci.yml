name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest httpx

    - name: Lint with Ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --output-format=github
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        ruff check . --exit-zero --line-length=127 --statistics

    - name: Run tests with Pytest
      run: |
        # Set dummy environments for testing
        export AZURE_TENANT_ID="fake-tenant"
        export AZURE_CLIENT_ID="fake-client"
        export AZURE_CLIENT_SECRET="fake-secret"
        export AZURE_SEARCH_SERVICE_ENDPOINT="https://fake.search.windows.net"
        export AZURE_SEARCH_ADMIN_KEY="fake-key"
        export AZURE_SEARCH_INDEX_NAME="fake-index"
        export AZURE_OPENAI_API_KEY="fake-key"
        export AZURE_OPENAI_ENDPOINT="https://fake.openai.azure.com/"
        export UI_CLIENT_ID="fake-ui-client"
        export UI_CLIENT_SECRET="fake-ui-secret"
        pytest tests/ api/test_main.py
